name: you_got_this
description: Application to organize family life.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:  
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  pie_chart: ^5.1.0
  fl_chart: ^1.2.0
  date_field: ^6.0.0
  firebase_core: ^4.7.0
  cloud_firestore: ^6.3.0
  provider: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  assets:
    - assets/images/
  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-VariableFont_wght.ttf
  uses-material-design: true

  